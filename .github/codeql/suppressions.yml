# Log Injection False Positives
# All console.log/warn/error calls are protected by sanitization functions
# that remove control characters (verified by unit tests)

suppressions:
  - rule: js/log-injection
    paths:
      - src/index.ts
    justification: |
      All logging uses sanitizeLogMessage/sanitizeLogValue which:
      1. Removes all control characters (0x00-0x1F, 0x7F-0x9F)
      2. Removes newlines, carriage returns, tabs
      3. Limits string length to prevent DoS

      CodeQL cannot recognize these custom sanitizers.
      Sanitization verified by unit tests in tests/security/log-injection.test.ts
    reviewed_by: Aether
    review_date: 2025-10-31
