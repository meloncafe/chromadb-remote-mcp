name: Code Coverage

on:
  pull_request:
    branches:
      - develop
      - release
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    name: Test Coverage
    runs-on: [self-hosted, Linux, ARM64, oci]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Enable Corepack (yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn type-check

      - name: Run unit tests with coverage
        run: yarn test:unit:coverage
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-chromadb-remote-mcp
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./junit.xml
          flags: unittests
          name: codecov-chromadb-remote-mcp
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload coverage to DeepSource
        run: |
          if [ -n "$DEEPSOURCE_DSN" ]; then
            echo ""
            echo "Uploading coverage to DeepSource..."
            curl -sL https://deepsource.io/cli | sh
            ./bin/deepsource report --analyzer test-coverage --key javascript --value-file ./coverage/lcov.info
          fi
