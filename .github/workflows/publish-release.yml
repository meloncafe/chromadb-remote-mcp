name: Publish Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers on semantic version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger
    inputs:
      version_tag:
        description: "Version tag to publish (e.g., v1.2.3)"
        required: true
        type: string

permissions:
  id-token: write # Required for OIDC authentication to MCP Registry
  contents: read
  packages: write

env:
  DOCKER_IMAGE: devsaurus/chromadb-remote-mcp

jobs:
  # ============================================
  # Job 1: Quality Gates (Parallel)
  # ============================================
  quality-gates:
    name: Quality Gates
    runs-on: [self-hosted, Linux, X64, hetzner-x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"

      - name: Enable Corepack (yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run type check
        run: yarn type-check

      - name: Run tests with coverage
        run: yarn test:unit:coverage

      - name: Build TypeScript package
        run: yarn build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            build/
            server.json
          retention-days: 1

  # ============================================
  # Job 2: Docker Build and Push
  # ============================================
  docker-publish:
    name: Docker Build & Push
    runs-on: [self-hosted, Linux, X64, hetzner-x64]
    needs: quality-gates
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || github.ref }}

      - name: Extract version from tag
        id: version
        run: |
          # Extract version from tag (v1.0.0 -> 1.0.0)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version_tag }}"
            VERSION=${VERSION#v}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Publishing version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name != 'workflow_dispatch' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name != 'workflow_dispatch' }}
            type=semver,pattern={{major}},enable=${{ github.event_name != 'workflow_dispatch' }}
            type=raw,value=${{ steps.version.outputs.VERSION }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest

      - name: Build and push multi-platform Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          # Supply chain attestations for enhanced security
          provenance: true
          sbom: true

      - name: Verify Docker Hub publication
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "🔍 Verifying Docker Hub tags..."
          sleep 5

          if docker manifest inspect ${{ env.DOCKER_IMAGE }}:$VERSION > /dev/null 2>&1; then
            echo "✅ Docker image ${{ env.DOCKER_IMAGE }}:$VERSION is available"
          else
            echo "⚠️ Docker image may take a few minutes to appear in registry"
          fi

  # ============================================
  # Job 3: MCP Registry Publication (TODO)
  # ============================================
