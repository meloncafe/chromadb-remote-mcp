services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    expose:
      - "8000"
    volumes:
      - ${CHROMA_DATA_PATH:-chroma-data}:/data
    environment:
      - IS_PERSISTENT=${IS_PERSISTENT:-TRUE}
      - ANONYMIZED_TELEMETRY=${ANONYMIZED_TELEMETRY:-FALSE}
      - OMP_NUM_THREADS=4
      - OMP_WAIT_POLICY=PASSIVE
    networks:
      - chroma-network
    restart: unless-stopped

  mcp-server:
    build: .
    container_name: chroma-mcp-server
    expose:
      - "3000"
    environment:
      - PORT=3000
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - CHROMA_HOST=${CHROMA_HOST:-chromadb}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - CHROMA_TENANT=${CHROMA_TENANT:-default_tenant}
      - CHROMA_DATABASE=${CHROMA_DATABASE:-default_database}
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ALLOW_QUERY_AUTH=${ALLOW_QUERY_AUTH:-true}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120000}
      - PING_TIMEOUT=${PING_TIMEOUT:-30000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_NO_WARNINGS=1
      - ORT_LOGGING_LEVEL=3
      # v2.0.0: Embedding provider
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # v2.0.0: Confidence gating
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD}
      # v2.0.0: Reranker (fail-soft)
      - RERANKER_API_BASE=${RERANKER_API_BASE}
      - RERANKER_API_KEY=${RERANKER_API_KEY}
      - RERANKER_MODEL=${RERANKER_MODEL}
      # v2.0.0: OAuth 2.1 OIDC multi-provider
      - OIDC_ISSUERS=${OIDC_ISSUERS}
      - OIDC_PRESET=${OIDC_PRESET}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE}
      - OIDC_SCOPES=${OIDC_SCOPES}
      - OIDC_LOG_SUB_MODE=${OIDC_LOG_SUB_MODE}
      # v2.0.0: Legacy v1 collection compat
      - LEGACY_COLLECTION_COMPAT=${LEGACY_COLLECTION_COMPAT}
    depends_on:
      - chromadb
    networks:
      - chroma-network
    restart: unless-stopped

  # Caddy Reverse Proxy (inline configuration)
  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    ports:
      - "${PORT:-8080}:80"
    command: caddy reverse-proxy --from :80 --to mcp-server:3000
    depends_on:
      - mcp-server
    networks:
      - chroma-network
    restart: unless-stopped

volumes:
  chroma-data:
    driver: local

networks:
  chroma-network:
    driver: bridge
