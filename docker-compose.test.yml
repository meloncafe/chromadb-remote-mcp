services:
  chromadb:
    image: chromadb/chroma:1.5.9@sha256:1e0b73a187a28757c572acba508c46f48c9e8b0acaf5c20e6d95cdedce1acdf6
    container_name: chromadb-test
    ports:
      - "127.0.0.1:8000:8000" # R6.a: loopback-only — ChromaDB has no built-in auth, do not publish on routable interface
    environment:
      - IS_PERSISTENT=FALSE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - test-network

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server-test
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-test-token-12345}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_TENANT=default_tenant
      - CHROMA_DATABASE=default_database
    depends_on:
      - chromadb
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
