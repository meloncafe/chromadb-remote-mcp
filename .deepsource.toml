version = 1

test_patterns = [
  "**/__tests__/**",
  "**/*.test.ts",
  "**/*.spec.ts"
]

exclude_patterns = [
  "**/node_modules/**",
  "**/build/**",
  "**/dist/**",
  "**/coverage/**",
  "**/*.d.ts",
  "**/yarn.lock",
  "**/package-lock.json"
]

[[analyzers]]
name = "secrets"

[[analyzers]]
name = "javascript"

  [analyzers.meta]
  environment = [
    "nodejs",
    "jest"
  ]

[[analyzers]]
name = "shell"

[[analyzers]]
name = "docker"